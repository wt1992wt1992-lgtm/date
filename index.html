<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>请问一起吃饭 吗</title>
  <style>
    :root {
      --bg: #ffe5ef;
      --bg2: #fff6fa;
      --pink: #ff5f9e;
      --hot: #ff2d78;
      --soft: #ffd6e6;
      --card: rgba(255, 255, 255, 0.88);
      --text: #5a3b48;
      --muted: #9b6c7d;
      --shadow: 0 18px 34px rgba(222, 75, 130, 0.22);
      --radius: 26px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      overflow: hidden;
      background: #111;
      color: var(--text);
      font-family: "Comic Sans MS", "Marker Felt", -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
    }

    button {
      border: 0;
      font: inherit;
      cursor: pointer;
      user-select: none;
    }

    .phone {
      position: relative;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      max-width: 430px;
      margin: 0 auto;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 16%, rgba(255, 111, 164, 0.22) 0 9%, transparent 9.5%),
        radial-gradient(circle at 82% 24%, rgba(255, 95, 158, 0.18) 0 7%, transparent 7.5%),
        linear-gradient(180deg, var(--bg2), var(--bg));
      isolation: isolate;
    }

    .phone::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      background-image:
        radial-gradient(circle at 50% 38%, rgba(255, 255, 255, 0.7), transparent 42%),
        repeating-radial-gradient(circle at 50% 48%, rgba(255, 79, 140, 0.08) 0 2px, transparent 2px 7px);
      opacity: 0.7;
      pointer-events: none;
    }

    .heart {
      position: absolute;
      z-index: 1;
      color: rgba(236, 63, 125, 0.48);
      font-size: var(--size);
      animation: floatHeart var(--speed) ease-in-out infinite;
      pointer-events: none;
      filter: drop-shadow(0 5px 8px rgba(236, 63, 125, 0.12));
    }

    .screen {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      padding: max(28px, env(safe-area-inset-top)) 22px max(24px, env(safe-area-inset-bottom));
      opacity: 0;
      transform: translateY(18px) scale(0.98);
      pointer-events: none;
      transition: opacity 360ms ease, transform 360ms cubic-bezier(.2,.85,.2,1);
    }

    .screen.active {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .meme {
      display: grid;
      place-items: center;
      width: min(48vw, 190px);
      height: min(48vw, 190px);
      margin-bottom: -4px;
      border-radius: 40% 60% 48% 52% / 48% 45% 55% 52%;
      background: rgba(255, 255, 255, 0.45);
      filter: drop-shadow(0 15px 18px rgba(222, 75, 130, 0.16));
      font-size: min(26vw, 104px);
      animation: wiggle 1.7s ease-in-out infinite;
    }

    .meme.small {
      width: min(35vw, 136px);
      height: min(35vw, 136px);
      font-size: min(21vw, 84px);
      margin-bottom: 0;
    }

    .meme img,
    .meme-duo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .meme.photo {
      overflow: hidden;
      border: 4px solid rgba(255, 255, 255, 0.86);
      background: #fff;
    }

    .meme-duo {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: min(78vw, 300px);
      margin-bottom: -4px;
      filter: drop-shadow(0 15px 18px rgba(222, 75, 130, 0.16));
    }

    .meme-duo img {
      aspect-ratio: 1;
      border: 4px solid rgba(255, 255, 255, 0.86);
      border-radius: 28px;
      background: #fff;
    }

    .meme-duo img:first-child {
      transform: rotate(-4deg);
    }

    .meme-duo img:last-child {
      transform: rotate(5deg);
    }

    .card {
      width: min(100%, 350px);
      padding: 27px 22px 24px;
      border: 3px solid rgba(232, 81, 138, 0.78);
      border-radius: 28px;
      background: var(--card);
      box-shadow: var(--shadow), 0 4px 0 rgba(232, 81, 138, 0.35);
      text-align: center;
      backdrop-filter: blur(8px);
    }

    h1,
    h2 {
      margin: 0;
      color: var(--text);
      font-size: clamp(28px, 8vw, 38px);
      line-height: 1.13;
      letter-spacing: 0;
      text-wrap: balance;
    }

    h2 {
      font-size: clamp(24px, 7vw, 32px);
    }

    .sub {
      margin: 13px 0 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.45;
      font-weight: 700;
    }

    .actions {
      position: relative;
      min-height: 80px;
      margin-top: 22px;
    }

    .pill {
      min-width: 132px;
      height: 58px;
      padding: 0 24px;
      border-radius: 999px;
      background: linear-gradient(180deg, #ff78b1, var(--hot));
      color: #fff;
      box-shadow: 0 12px 20px rgba(228, 54, 119, 0.28), inset 0 2px 0 rgba(255,255,255,0.38);
      font-size: 20px;
      font-weight: 900;
      transition: transform 180ms ease, filter 180ms ease;
    }

    .pill:active {
      transform: scale(0.95);
      filter: brightness(0.98);
    }

    .pill.secondary {
      position: absolute;
      z-index: 20;
      min-width: 124px;
      height: 56px;
      border: 3px solid #fff;
      background: linear-gradient(180deg, #302050, #111);
      box-shadow: 0 13px 20px rgba(40, 13, 33, 0.28), 0 0 0 4px rgba(255, 95, 158, 0.32);
      font-size: 21px;
      letter-spacing: 0;
      animation: noPulse 760ms ease-in-out infinite;
      transition: left 560ms cubic-bezier(.18,.89,.32,1.28), top 560ms cubic-bezier(.18,.89,.32,1.28), transform 180ms ease;
    }

    .pill.disabled {
      opacity: 0.48;
      filter: grayscale(0.2);
    }

    .date-picker {
      width: min(100%, 360px);
      padding: 22px 18px;
      border-radius: 28px;
      background: rgba(82, 68, 78, 0.56);
      box-shadow: 0 20px 38px rgba(80, 45, 61, 0.28);
      color: #fff;
      backdrop-filter: blur(18px);
    }

    .date-picker h2 {
      color: #fff;
      margin-bottom: 18px;
    }

    .picker-window {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr 0.8fr;
      gap: 12px;
      height: 170px;
      align-items: center;
      overflow: hidden;
      mask-image: linear-gradient(transparent, #000 22%, #000 78%, transparent);
    }

    .picker-col {
      display: grid;
      gap: 15px;
      color: rgba(255,255,255,0.42);
      font-size: 24px;
      font-weight: 800;
      text-align: center;
    }

    .picker-col strong {
      color: #fff;
      font-size: 34px;
      text-shadow: 0 2px 10px rgba(255,255,255,0.25);
    }

    .picker-line {
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      height: 46px;
      border-radius: 999px;
      background: rgba(255,255,255,0.16);
      transform: translateY(-50%);
      pointer-events: none;
    }

    .picker-wrap {
      position: relative;
    }

    .hour-strip {
      display: flex;
      gap: 10px;
      margin: 16px -4px 0;
      padding: 3px 4px 12px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }

    .hour-strip::-webkit-scrollbar {
      display: none;
    }

    .hour-chip {
      flex: 0 0 auto;
      width: 64px;
      height: 44px;
      border-radius: 999px;
      background: rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.72);
      font-size: 17px;
      font-weight: 900;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.12);
      scroll-snap-align: center;
      transition: transform 160ms ease, background 160ms ease, color 160ms ease, box-shadow 160ms ease;
    }

    .hour-chip.selected {
      background: #fff;
      color: var(--hot);
      box-shadow: 0 8px 18px rgba(228, 54, 119, 0.22);
      transform: translateY(-2px) scale(1.05);
    }

    .date-options {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 9px;
      margin-top: 18px;
    }

    .date-option {
      height: 48px;
      border-radius: 999px;
      background: rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.78);
      font-size: 15px;
      font-weight: 900;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.14);
      transition: transform 160ms ease, background 160ms ease, color 160ms ease;
    }

    .date-option.selected {
      background: #fff;
      color: var(--hot);
      transform: translateY(-2px);
    }

    .date-option:disabled {
      cursor: not-allowed;
      opacity: 0.38;
    }

    .food-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 20px;
    }

    .food {
      display: grid;
      place-items: center;
      height: 74px;
      border-radius: 20px;
      background: rgba(255,255,255,0.88);
      box-shadow: 0 9px 16px rgba(222, 75, 130, 0.18), inset 0 -3px 0 rgba(232, 81, 138, 0.1);
      font-size: 34px;
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    .food.selected {
      background: #fff0f7;
      box-shadow: 0 0 0 3px var(--pink), 0 12px 18px rgba(222, 75, 130, 0.22);
      transform: translateY(-4px) rotate(-3deg);
    }

    .custom-food {
      width: 100%;
      height: 54px;
      margin-top: 12px;
      padding: 0 18px;
      border: 2px solid rgba(232, 81, 138, 0.32);
      border-radius: 999px;
      background: rgba(255,255,255,0.72);
      color: var(--text);
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.72);
      font: inherit;
      font-size: 16px;
      font-weight: 800;
      outline: none;
    }

    .custom-food::placeholder {
      color: rgba(155, 108, 125, 0.48);
    }

    .custom-food:focus {
      border-color: var(--pink);
      box-shadow: 0 0 0 4px rgba(255, 95, 158, 0.16), inset 0 2px 0 rgba(255,255,255,0.72);
    }

    .summary {
      display: grid;
      gap: 12px;
      margin-top: 18px;
      font-size: 16px;
      font-weight: 800;
      color: var(--text);
    }

    .summary div {
      display: flex;
      justify-content: center;
      gap: 9px;
      flex-wrap: wrap;
    }

    .mini {
      display: inline-grid;
      place-items: center;
      min-width: 82px;
      padding: 7px 11px;
      border-radius: 999px;
      background: #fff0f7;
      color: var(--hot);
    }

    .toast {
      position: absolute;
      left: 50%;
      bottom: max(28px, env(safe-area-inset-bottom));
      z-index: 30;
      width: min(86vw, 330px);
      padding: 12px 16px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: var(--shadow);
      color: var(--hot);
      text-align: center;
      font-size: 15px;
      font-weight: 900;
      opacity: 0;
      transform: translateX(-50%) translateY(18px);
      pointer-events: none;
      transition: opacity 220ms ease, transform 220ms ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .fx-layer {
      position: absolute;
      inset: 0;
      z-index: 25;
      pointer-events: none;
      overflow: hidden;
    }

    .fall {
      position: absolute;
      top: -40px;
      animation: fall 1500ms ease-in forwards;
      font-size: 27px;
    }

    @keyframes floatHeart {
      0%, 100% { transform: translateY(0) rotate(-6deg) scale(1); opacity: 0.48; }
      50% { transform: translateY(-18px) rotate(8deg) scale(1.1); opacity: 0.78; }
    }

    @keyframes wiggle {
      0%, 100% { transform: rotate(-3deg) translateY(0); }
      50% { transform: rotate(4deg) translateY(-5px); }
    }

    @keyframes noPulse {
      0%, 100% { transform: rotate(-5deg) scale(1); }
      50% { transform: rotate(5deg) scale(1.1); }
    }

    @keyframes fall {
      from { opacity: 0; transform: translate3d(0, -18px, 0) rotate(0deg); }
      15% { opacity: 1; }
      to { opacity: 0; transform: translate3d(var(--drift), 105vh, 0) rotate(var(--spin)); }
    }

    @media (max-height: 720px) {
      .screen { gap: 12px; padding-top: max(18px, env(safe-area-inset-top)); }
      .meme { width: min(34vw, 124px); height: min(34vw, 124px); font-size: min(21vw, 82px); }
      .meme-duo { width: min(72vw, 250px); }
      .card { padding: 21px 18px 19px; }
      h1 { font-size: 28px; }
      h2 { font-size: 24px; }
      .sub { font-size: 14px; }
      .picker-window { height: 138px; }
      .food { height: 62px; font-size: 30px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="phone" id="app">
    <span class="heart" style="left:9%;top:11%;--size:31px;--speed:3.4s;">♥</span>
    <span class="heart" style="left:70%;top:8%;--size:24px;--speed:4.2s;">♥</span>
    <span class="heart" style="left:83%;top:22%;--size:34px;--speed:3.8s;">♥</span>
    <span class="heart" style="left:14%;top:39%;--size:26px;--speed:4.6s;">♥</span>
    <span class="heart" style="left:75%;top:54%;--size:24px;--speed:3.1s;">♥</span>
    <span class="heart" style="left:20%;top:76%;--size:39px;--speed:4s;">♥</span>
    <span class="heart" style="left:62%;top:84%;--size:27px;--speed:3.6s;">♥</span>

    <section class="screen active" data-screen="ask">
      <div class="meme photo" aria-hidden="true">
        <img src="assets/cat-ask.jpg" alt="">
      </div>
      <div class="card">
        <h1>要一起吃饭饭吗？</h1>
        <p class="sub">给你一个认真考虑 0.3 秒的机会。</p>
        <div class="actions">
          <button class="pill" id="yesBtn" type="button">Yes 💕</button>
          <button class="pill secondary" id="noBtn" type="button">NO</button>
        </div>
      </div>
    </section>

    <section class="screen" data-screen="yes">
      <div class="meme photo" aria-hidden="true">
        <img src="assets/cat-yes.jpg" alt="">
      </div>
      <div class="card">
        <h2>没想到你会点yes</h2>
        <p class="sub">我本来已经准备好看你点 No了。</p>
        <button class="pill" id="nextToDate" type="button">Next 💖</button>
      </div>
    </section>

    <section class="screen" data-screen="date">
      <div class="date-picker">
        <h2>什么时候集合？</h2>
        <div class="picker-wrap">
          <div class="picker-line"></div>
          <div class="picker-window" id="pickerWindow" aria-label="今天 19:00">
            <div class="picker-col">
              <span>昨天</span>
              <strong id="pickerDay">今天</strong>
              <span>明天</span>
            </div>
            <div class="picker-col">
              <span id="prevHour">18</span>
              <strong id="pickerHour">19</strong>
              <span id="nextHour">20</span>
            </div>
            <div class="picker-col">
              <span>30</span>
              <strong>00</strong>
              <span>30</span>
            </div>
          </div>
        </div>
        <div class="hour-strip" id="hourStrip" aria-label="滑动选择几点">
          <button class="hour-chip" data-hour="17" type="button">17点</button>
          <button class="hour-chip" data-hour="18" type="button">18点</button>
          <button class="hour-chip selected" data-hour="19" type="button">19点</button>
          <button class="hour-chip" data-hour="20" type="button">20点</button>
          <button class="hour-chip" data-hour="21" type="button">21点</button>
          <button class="hour-chip" data-hour="22" type="button">22点</button>
        </div>
        <div class="date-options">
          <button class="date-option selected" data-day="今天" type="button">今天</button>
          <button class="date-option" data-day="明天" type="button">明天</button>
          <button class="date-option" id="customTimeBtn" type="button" disabled>你定时间</button>
        </div>
        <div class="actions">
          <button class="pill" id="confirmDate" type="button">✓ 就这个</button>
          <button class="pill disabled" id="resetDate" type="button">Reset</button>
        </div>
      </div>
    </section>

    <section class="screen" data-screen="food">
      <div class="card">
        <h2>想吃点什么？😉</h2>
        <p class="sub">先随便点一个，反正最后还是我安排。</p>
        <div class="food-grid" id="foodGrid">
          <button class="food" data-food="🍲 火锅" type="button">🍲</button>
          <button class="food" data-food="🥩 烤肉" type="button">🥩</button>
          <button class="food" data-food="🍣 日料" type="button">🍣</button>
          <button class="food" data-food="🍗 韩料" type="button">🍗</button>
          <button class="food" data-food="🦞 小龙虾" type="button">🦞</button>
          <button class="food" data-food="🍖 烧烤" type="button">🍖</button>
        </div>
        <div class="actions">
          <button class="pill disabled" id="finishBtn" type="button">Pick one first</button>
          <input class="custom-food" id="customFoodInput" type="text" maxlength="18" placeholder="或者你想吃什么呢">
        </div>
      </div>
    </section>

    <section class="screen" data-screen="done">
      <div class="meme-duo" aria-hidden="true">
        <img src="assets/cat-done-1.jpg" alt="">
        <img src="assets/cat-done-2.jpg" alt="">
      </div>
      <div class="card">
        <h2>收到，饭搭子。</h2>
        <p class="sub" id="finalLead">准备好肚子，我来接你。</p>
        <div class="summary">
          <div><span>人员</span><span class="mini">你 + 我</span></div>
          <div><span>时间</span><span class="mini" id="finalTime">今天 19:00</span></div>
          <div><span>吃什么</span><span class="mini" id="finalFood">还没选</span></div>
        </div>
      </div>
    </section>

    <div class="toast" id="toast"></div>
    <div class="fx-layer" id="fxLayer"></div>
  </main>

  <script>
    const state = {
      screen: "ask",
      noTimer: null,
      food: "",
      customFood: "",
      time: "今天 19:00",
      day: "今天",
      hour: 19,
    };

    const app = document.getElementById("app");
    const screens = [...document.querySelectorAll(".screen")];
    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");
    const toast = document.getElementById("toast");
    const fxLayer = document.getElementById("fxLayer");
    const finishBtn = document.getElementById("finishBtn");
    const customFoodInput = document.getElementById("customFoodInput");
    const finalFood = document.getElementById("finalFood");
    const finalTime = document.getElementById("finalTime");
    const finalLead = document.getElementById("finalLead");
    const pickerWindow = document.getElementById("pickerWindow");
    const pickerDay = document.getElementById("pickerDay");
    const pickerHour = document.getElementById("pickerHour");
    const prevHour = document.getElementById("prevHour");
    const nextHour = document.getElementById("nextHour");
    const hourStrip = document.getElementById("hourStrip");

    function random(min, max) {
      return Math.random() * (max - min) + min;
    }

    function go(next) {
      state.screen = next;
      screens.forEach((screen) => {
        screen.classList.toggle("active", screen.dataset.screen === next);
      });
      if (next !== "ask") stopNo();
    }

    function showToast(text) {
      toast.textContent = text;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove("show"), 1400);
    }

    function formatTime() {
      state.time = `${state.day} ${String(state.hour).padStart(2, "0")}:00`;
    }

    function renderPicker() {
      formatTime();
      pickerDay.textContent = state.day;
      pickerHour.textContent = String(state.hour).padStart(2, "0");
      prevHour.textContent = String(Math.max(0, state.hour - 1)).padStart(2, "0");
      nextHour.textContent = String(Math.min(23, state.hour + 1)).padStart(2, "0");
      pickerWindow.setAttribute("aria-label", state.time);

      document.querySelectorAll(".date-option[data-day]").forEach((btn) => {
        btn.classList.toggle("selected", btn.dataset.day === state.day);
      });
      document.querySelectorAll(".hour-chip").forEach((btn) => {
        btn.classList.toggle("selected", Number(btn.dataset.hour) === state.hour);
      });
    }

    function moveNo() {
      if (state.screen !== "ask") return;
      const appRect = app.getBoundingClientRect();
      const btnRect = noBtn.getBoundingClientRect();
      const margin = 12;
      const maxLeft = appRect.width - btnRect.width - margin;
      const maxTop = appRect.height - btnRect.height - margin;
      noBtn.style.left = `${random(margin, Math.max(margin, maxLeft))}px`;
      noBtn.style.top = `${random(margin, Math.max(margin, maxTop))}px`;
      clearTimeout(state.noTimer);
      state.noTimer = setTimeout(moveNo, random(500, 800));
    }

    function stopNo() {
      clearTimeout(state.noTimer);
      state.noTimer = null;
    }

    function hearts() {
      fxLayer.innerHTML = "";
      const list = ["💗", "💕", "💖", "💘", "🍚", "🥢"];
      for (let i = 0; i < 34; i += 1) {
        const item = document.createElement("span");
        item.className = "fall";
        item.textContent = list[Math.floor(Math.random() * list.length)];
        item.style.left = `${random(0, 96)}%`;
        item.style.animationDelay = `${random(0, 260)}ms`;
        item.style.setProperty("--drift", `${random(-70, 70)}px`);
        item.style.setProperty("--spin", `${random(160, 560)}deg`);
        fxLayer.appendChild(item);
      }
      setTimeout(() => { fxLayer.innerHTML = ""; }, 1900);
    }

    yesBtn.addEventListener("click", () => {
      hearts();
      if (navigator.vibrate) navigator.vibrate([40, 30, 60]);
      setTimeout(() => go("yes"), 620);
    });

    noBtn.addEventListener("click", (event) => {
      event.preventDefault();
      showToast("别点这个，系统会伤心。");
      moveNo();
    });
    noBtn.addEventListener("touchstart", (event) => {
      event.preventDefault();
      showToast("抓不到吧。");
      moveNo();
    }, { passive: false });
    noBtn.addEventListener("pointerenter", moveNo);

    document.getElementById("nextToDate").addEventListener("click", () => go("date"));
    document.getElementById("confirmDate").addEventListener("click", () => go("food"));
    document.getElementById("resetDate").addEventListener("click", () => {
      state.day = "今天";
      state.hour = 19;
      renderPicker();
      showToast("重置成今天，别想太多。");
    });

    document.querySelectorAll(".date-option[data-day]").forEach((btn) => {
      btn.addEventListener("click", () => {
        state.day = btn.dataset.day;
        renderPicker();
      });
    });

    document.querySelectorAll(".hour-chip").forEach((btn) => {
      btn.addEventListener("click", () => {
        state.hour = Number(btn.dataset.hour);
        renderPicker();
        btn.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
      });
    });

    hourStrip.addEventListener("scroll", () => {
      clearTimeout(hourStrip.snapTimer);
      hourStrip.snapTimer = setTimeout(() => {
        const stripRect = hourStrip.getBoundingClientRect();
        const center = stripRect.left + stripRect.width / 2;
        let nearest = null;
        let distance = Infinity;

        document.querySelectorAll(".hour-chip").forEach((btn) => {
          const rect = btn.getBoundingClientRect();
          const btnCenter = rect.left + rect.width / 2;
          const currentDistance = Math.abs(btnCenter - center);
          if (currentDistance < distance) {
            nearest = btn;
            distance = currentDistance;
          }
        });

        if (nearest) {
          state.hour = Number(nearest.dataset.hour);
          renderPicker();
        }
      }, 120);
    });

    document.querySelectorAll(".food").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".food").forEach((food) => food.classList.remove("selected"));
        btn.classList.add("selected");
        state.food = btn.dataset.food;
        finishBtn.classList.remove("disabled");
        finishBtn.textContent = "OK 就它 💅";
      });
    });

    customFoodInput.addEventListener("input", () => {
      state.customFood = customFoodInput.value.trim();
      if (state.customFood) {
        finishBtn.classList.remove("disabled");
        finishBtn.textContent = "OK 就吃这个 💅";
      } else if (!state.food) {
        finishBtn.classList.add("disabled");
        finishBtn.textContent = "Pick one first";
      } else {
        finishBtn.textContent = "OK 就它 💅";
      }
    });

    finishBtn.addEventListener("click", () => {
      const pickedFood = state.customFood || state.food;
      if (!pickedFood) {
        showToast("先点一个吃的。");
        return;
      }
      finalFood.textContent = pickedFood;
      finalTime.textContent = state.time;
      finalLead.textContent = `${state.time}，准备好肚子，我来接你。`;
      hearts();
      setTimeout(() => go("done"), 430);
    });

    window.addEventListener("resize", () => {
      if (state.screen === "ask") moveNo();
    });

    moveNo();
    renderPicker();
  </script>
</body>
</html>
