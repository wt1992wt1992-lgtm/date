<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>请问一起吃饭 吗</title>
  <style>
    :root {
      --bg: #ffe5ef;
      --bg2: #fff6fa;
      --pink: #ff5f9e;
      --hot: #ff2d78;
      --soft: #ffd6e6;
      --card: rgba(255, 255, 255, 0.88);
      --text: #5a3b48;
      --muted: #9b6c7d;
      --shadow: 0 18px 34px rgba(222, 75, 130, 0.22);
      --radius: 26px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      overflow: hidden;
      background: #111;
      color: var(--text);
      font-family: "Comic Sans MS", "Marker Felt", -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
    }

    button {
      border: 0;
      font: inherit;
      cursor: pointer;
      user-select: none;
    }

    .phone {
      position: relative;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      max-width: 430px;
      margin: 0 auto;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 16%, rgba(255, 111, 164, 0.22) 0 9%, transparent 9.5%),
        radial-gradient(circle at 82% 24%, rgba(255, 95, 158, 0.18) 0 7%, transparent 7.5%),
        linear-gradient(180deg, var(--bg2), var(--bg));
      isolation: isolate;
    }

    .phone::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      background-image:
        radial-gradient(circle at 50% 38%, rgba(255, 255, 255, 0.7), transparent 42%),
        repeating-radial-gradient(circle at 50% 48%, rgba(255, 79, 140, 0.08) 0 2px, transparent 2px 7px);
      opacity: 0.7;
      pointer-events: none;
    }

    .heart {
      position: absolute;
      z-index: 1;
      color: rgba(236, 63, 125, 0.48);
      font-size: var(--size);
      animation: floatHeart var(--speed) ease-in-out infinite;
      pointer-events: none;
      filter: drop-shadow(0 5px 8px rgba(236, 63, 125, 0.12));
    }

    .screen {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      padding: max(28px, env(safe-area-inset-top)) 22px max(24px, env(safe-area-inset-bottom));
      opacity: 0;
      transform: translateY(18px) scale(0.98);
      pointer-events: none;
      transition: opacity 360ms ease, transform 360ms cubic-bezier(.2,.85,.2,1);
    }

    .screen.active {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    [data-screen="ask"].screen {
      justify-content: flex-start;
      gap: 18px;
      padding-top: max(78px, env(safe-area-inset-top));
    }

    .meme {
      display: grid;
      place-items: center;
      width: min(48vw, 190px);
      height: min(48vw, 190px);
      margin-bottom: -4px;
      border-radius: 40% 60% 48% 52% / 48% 45% 55% 52%;
      background: rgba(255, 255, 255, 0.45);
      filter: drop-shadow(0 15px 18px rgba(222, 75, 130, 0.16));
      font-size: min(26vw, 104px);
      animation: wiggle 1.7s ease-in-out infinite;
    }

    .meme.small {
      width: min(35vw, 136px);
      height: min(35vw, 136px);
      font-size: min(21vw, 84px);
      margin-bottom: 0;
    }

    .meme img {
      width: 200px;
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 12px 20px rgba(222,75,130,0.18));
      transform: rotate(-1deg);
      display: block;
    }

    .meme-duo img {
      width: 100%;
      height: auto;
      object-fit: contain;
      display: block;
    }

    .meme.photo {
      width: auto;
      height: auto;
      padding: 0;
      overflow: visible;
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
    }

    .meme.photo img {
      border-radius: 0;
      background: transparent;
    }

    [data-screen="ask"] .meme.photo {
      width: auto;
    }

    [data-screen="ask"] .meme.photo img {
      width: 200px;
      height: auto;
      filter: drop-shadow(0 12px 20px rgba(222,75,130,0.18));
      transform: rotate(-1deg);
    }

    [data-screen="yes"] .meme.photo img {
      width: 200px;
      height: auto;
      filter: drop-shadow(0 12px 20px rgba(222,75,130,0.18));
      transform: rotate(-1deg);
    }

    .bottom-stickers {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 18px;
      margin-top: -4px;
      pointer-events: none;
    }

    .bottom-stickers img {
      width: 200px;
      height: auto;
      filter: drop-shadow(0 12px 20px rgba(222,75,130,0.18));
      transform: rotate(-1deg);
      display: block;
    }

    .bottom-stickers img:last-child {
      transform: rotate(1deg);
    }

    .meme-duo {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: min(86vw, 330px);
      margin-bottom: -4px;
      filter: drop-shadow(0 15px 18px rgba(222, 75, 130, 0.16));
    }

    .meme-duo img {
      padding: 8px;
      aspect-ratio: auto;
      border: 0;
      border-radius: 26% 32% 28% 30% / 24% 28% 32% 34%;
      background: #fff;
      box-shadow:
        0 0 0 2px rgba(255, 255, 255, 0.96),
        0 12px 22px rgba(222, 75, 130, 0.16);
    }

    .meme-duo img:first-child {
      transform: rotate(-4deg);
    }

    .meme-duo img:last-child {
      transform: rotate(5deg);
    }

    .card {
      width: min(100%, 350px);
      padding: 27px 22px 24px;
      border: 3px solid rgba(232, 81, 138, 0.78);
      border-radius: 28px;
      background: var(--card);
      box-shadow: var(--shadow), 0 4px 0 rgba(232, 81, 138, 0.35);
      text-align: center;
      backdrop-filter: blur(8px);
    }

    h1,
    h2 {
      margin: 0;
      color: var(--text);
      font-size: clamp(28px, 8vw, 38px);
      line-height: 1.13;
      letter-spacing: 0;
      text-wrap: balance;
    }

    h2 {
      font-size: clamp(24px, 7vw, 32px);
    }

    .sub {
      margin: 13px 0 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.45;
      font-weight: 700;
    }

    .actions {
      position: relative;
      min-height: 80px;
      margin-top: 22px;
    }

    [data-screen="ask"] .actions {
      position: static;
    }

    .pill {
      min-width: 132px;
      height: 58px;
      padding: 0 24px;
      border-radius: 999px;
      background: linear-gradient(180deg, #ff78b1, var(--hot));
      color: #fff;
      box-shadow: 0 12px 20px rgba(228, 54, 119, 0.28), inset 0 2px 0 rgba(255,255,255,0.38);
      font-size: 20px;
      font-weight: 900;
      transition: transform 180ms ease, filter 180ms ease;
    }

    .pill:active {
      transform: scale(0.95);
      filter: brightness(0.98);
    }

    .pill.secondary {
      position: absolute;
      z-index: 20;
      min-width: 124px;
      height: 56px;
      border: 3px solid #fff;
      background: linear-gradient(180deg, #302050, #111);
      box-shadow: 0 13px 20px rgba(40, 13, 33, 0.28), 0 0 0 4px rgba(255, 95, 158, 0.32);
      font-size: 21px;
      letter-spacing: 0;
      animation: noPulse 420ms ease-in-out infinite;
      transition: left 180ms cubic-bezier(.18,.89,.32,1.28), top 180ms cubic-bezier(.18,.89,.32,1.28), transform 120ms ease;
    }

    .pill.disabled {
      opacity: 0.48;
      filter: grayscale(0.2);
    }

    .date-picker {
      width: min(100%, 360px);
      padding: 22px 18px;
      border-radius: 28px;
      background: rgba(82, 68, 78, 0.56);
      box-shadow: 0 20px 38px rgba(80, 45, 61, 0.28);
      color: #fff;
      backdrop-filter: blur(18px);
    }

    .date-picker h2 {
      color: #fff;
      margin-bottom: 18px;
    }

    .picker-window {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr 0.8fr;
      gap: 12px;
      height: 170px;
      align-items: center;
      overflow: hidden;
      mask-image: linear-gradient(transparent, #000 22%, #000 78%, transparent);
    }

    .picker-col {
      display: grid;
      gap: 15px;
      color: rgba(255,255,255,0.42);
      font-size: 24px;
      font-weight: 800;
      text-align: center;
    }

    .picker-col strong {
      color: #fff;
      font-size: 34px;
      text-shadow: 0 2px 10px rgba(255,255,255,0.25);
    }

    .picker-line {
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      height: 46px;
      border-radius: 999px;
      background: rgba(255,255,255,0.16);
      transform: translateY(-50%);
      pointer-events: none;
    }

    .picker-wrap {
      position: relative;
    }

    .hour-strip {
      display: flex;
      gap: 10px;
      margin: 16px -4px 0;
      padding: 3px 4px 12px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }

    .hour-strip::-webkit-scrollbar {
      display: none;
    }

    .hour-chip {
      flex: 0 0 auto;
      width: 64px;
      height: 44px;
      border-radius: 999px;
      background: rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.72);
      font-size: 17px;
      font-weight: 900;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.12);
      scroll-snap-align: center;
      transition: transform 160ms ease, background 160ms ease, color 160ms ease, box-shadow 160ms ease;
    }

    .hour-chip.selected {
      background: #fff;
      color: var(--hot);
      box-shadow: 0 8px 18px rgba(228, 54, 119, 0.22);
      transform: translateY(-2px) scale(1.05);
    }

    .date-options {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 9px;
      margin-top: 18px;
    }

    .date-option {
      height: 48px;
      border-radius: 999px;
      background: rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.78);
      font-size: 15px;
      font-weight: 900;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.14);
      transition: transform 160ms ease, background 160ms ease, color 160ms ease;
    }

    .date-option.selected {
      background: #fff;
      color: var(--hot);
      transform: translateY(-2px);
    }

    .date-option:disabled {
      cursor: not-allowed;
      opacity: 0.38;
    }

    .food-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 20px;
    }

    .food {
      display: grid;
      place-items: center;
      height: 74px;
      border-radius: 20px;
      background: rgba(255,255,255,0.88);
      box-shadow: 0 9px 16px rgba(222, 75, 130, 0.18), inset 0 -3px 0 rgba(232, 81, 138, 0.1);
      font-size: 34px;
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    .food.selected {
      background: #fff0f7;
      box-shadow: 0 0 0 3px var(--pink), 0 12px 18px rgba(222, 75, 130, 0.22);
      transform: translateY(-4px) rotate(-3deg);
    }

    .custom-food {
      width: 100%;
      height: 54px;
      margin-top: 12px;
      padding: 0 18px;
      border: 2px solid rgba(232, 81, 138, 0.32);
      border-radius: 999px;
      background: rgba(255,255,255,0.72);
      color: var(--text);
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.72);
      font: inherit;
      font-size: 16px;
      font-weight: 800;
      outline: none;
    }

    .custom-food::placeholder {
      color: rgba(155, 108, 125, 0.48);
    }

    .custom-food:focus {
      border-color: var(--pink);
      box-shadow: 0 0 0 4px rgba(255, 95, 158, 0.16), inset 0 2px 0 rgba(255,255,255,0.72);
    }

    .summary {
      display: grid;
      gap: 12px;
      margin-top: 18px;
      font-size: 16px;
      font-weight: 800;
      color: var(--text);
    }

    .summary div {
      display: flex;
      justify-content: center;
      gap: 9px;
      flex-wrap: wrap;
    }

    .mini {
      display: inline-grid;
      place-items: center;
      min-width: 82px;
      padding: 7px 11px;
      border-radius: 999px;
      background: #fff0f7;
      color: var(--hot);
    }

    [data-screen="share"].screen {
      justify-content: center;
      gap: 18px;
      padding: max(28px, env(safe-area-inset-top)) 18px max(24px, env(safe-area-inset-bottom));
    }

    .result-card {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      width: min(100%, 360px);
      min-height: min(76dvh, 630px);
      max-height: 80dvh;
      padding: 34px 24px 30px;
      border: 2px solid rgba(255, 159, 192, 0.86);
      border-radius: 32px;
      background:
        radial-gradient(circle at 50% 24%, rgba(255, 255, 255, 0.98) 0 20%, rgba(255,255,255,0.7) 52%, rgba(255,255,255,0.86) 100%),
        repeating-radial-gradient(circle at 50% 28%, rgba(255, 95, 158, 0.045) 0 1px, transparent 1px 9px),
        rgba(255, 255, 255, 0.76);
      box-shadow: 0 22px 46px rgba(222, 75, 130, 0.18), inset 0 0 0 1px rgba(255,255,255,0.74);
      text-align: center;
      animation: cardIn 420ms cubic-bezier(.2,.85,.2,1) both;
    }

    .result-card.exporting,
    .result-card.exporting * {
      animation: none !important;
      transition: none !important;
    }

    .result-sticker {
      position: relative;
      width: 230px;
      height: 190px;
      margin: 0 auto 8px;
    }

    .result-sticker img {
      position: relative;
      z-index: 2;
      width: 220px;
      max-height: 188px;
      object-fit: contain;
      filter:
        drop-shadow(0 0 0 #fff)
        drop-shadow(0 14px 20px rgba(222, 75, 130, 0.2));
      transform: rotate(-1deg);
    }

    .result-float {
      position: absolute;
      z-index: 1;
      color: rgba(236, 63, 125, 0.74);
      font-size: var(--s);
      animation: floatHeart var(--speed) ease-in-out infinite;
      pointer-events: none;
    }

    .result-rank {
      margin: 2px 0 0;
      color: rgba(90, 59, 72, 0.6);
      font-size: 13px;
      line-height: 1.4;
      font-weight: 900;
    }

    .result-rank strong {
      color: var(--pink);
      font-size: 18px;
      letter-spacing: 0;
      text-shadow: 0 3px 0 rgba(255,255,255,0.78);
    }

    .dash {
      height: 1px;
      margin: 22px auto;
      width: 72%;
      background-image: linear-gradient(90deg, rgba(255, 142, 184, 0.88) 60%, transparent 0);
      background-size: 10px 2px;
      background-repeat: repeat-x;
    }

    .achievement {
      display: grid;
      gap: 10px;
      justify-items: center;
    }

    .achievement-label {
      color: var(--pink);
      font-size: 15px;
      font-weight: 900;
    }

    .achievement-title {
      color: var(--text);
      font-size: 31px;
      line-height: 1.08;
      font-weight: 1000;
    }

    .result-heading {
      color: var(--pink);
      font-size: 16px;
      font-weight: 1000;
    }

    .choice-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 14px;
    }

    .choice-tile {
      min-height: 104px;
      padding: 16px 10px 14px;
      border: 1.5px solid rgba(255, 159, 192, 0.72);
      border-radius: 20px;
      background: rgba(255, 246, 250, 0.82);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 10px 18px rgba(222, 75, 130, 0.08);
      color: var(--text);
      font-weight: 900;
      font-size: 14px;
    }

    .choice-tile .choice-icon {
      display: block;
      margin: 8px 0 8px;
      color: var(--pink);
      font-size: 30px;
      line-height: 1;
    }

    .choice-tile .choice-value {
      color: #be2b68;
      font-size: 15px;
      line-height: 1.25;
      word-break: break-word;
    }

    .poster-main {
      display: grid;
      justify-items: center;
    }

    .poster-choices {
      display: grid;
    }

    .poster-reward {
      margin-top: 22px;
      color: #c43772;
      font-size: 15px;
      line-height: 1.35;
      font-weight: 900;
    }

    .reward-heart {
      display: block;
      margin-top: 7px;
      color: #d71920;
      font-size: 24px;
      text-shadow: 0 2px 0 rgba(255,255,255,0.78);
    }

    .reward-pills {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 11px;
    }

    .reward-pill {
      min-height: 32px;
      display: grid;
      place-items: center;
      padding: 5px 7px;
      border: 1px solid rgba(245, 192, 78, 0.7);
      border-radius: 9px;
      background: rgba(255, 251, 229, 0.78);
      color: #653948;
      font-size: 12px;
      line-height: 1.2;
      font-weight: 900;
      white-space: nowrap;
    }

    .system-note {
      display: grid;
      grid-template-columns: 42px 1fr;
      gap: 12px;
      align-items: start;
      max-width: 250px;
      margin: 0 auto;
      text-align: left;
      color: var(--text);
      font-size: 17px;
      line-height: 1.48;
      font-weight: 900;
    }

    .system-note .mailbox {
      font-size: 32px;
      line-height: 1;
      text-align: center;
      filter: drop-shadow(0 6px 10px rgba(222, 75, 130, 0.18));
    }

    .result-pointer {
      margin: -3px 0 10px;
      font-size: 22px;
    }

    .result-actions {
      display: grid;
      place-items: center;
      width: min(100%, 342px);
      padding: 0 4px;
    }

    .result-btn {
      width: min(100%, 250px);
      height: 51px;
      border: 1.5px solid rgba(255, 159, 192, 0.78);
      border-radius: 15px;
      background: linear-gradient(180deg, #ffe1ed, #ffc4da);
      color: var(--hot);
      box-shadow: 0 9px 18px rgba(222, 75, 130, 0.16), inset 0 1px 0 rgba(255,255,255,0.86);
      font-size: 18px;
      font-weight: 1000;
    }

    .result-footer {
      margin-top: 13px;
      color: rgba(255, 95, 158, 0.72);
      font-size: 14px;
      letter-spacing: 5px;
    }

    .share-entry {
      margin-top: 16px;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(16px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .toast {
      position: absolute;
      left: 50%;
      bottom: max(28px, env(safe-area-inset-bottom));
      z-index: 30;
      width: min(86vw, 330px);
      padding: 12px 16px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: var(--shadow);
      color: var(--hot);
      text-align: center;
      font-size: 15px;
      font-weight: 900;
      opacity: 0;
      transform: translateX(-50%) translateY(18px);
      pointer-events: none;
      transition: opacity 220ms ease, transform 220ms ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .fx-layer {
      position: absolute;
      inset: 0;
      z-index: 25;
      pointer-events: none;
      overflow: hidden;
    }

    .fall {
      position: absolute;
      top: -40px;
      animation: fall 1500ms ease-in forwards;
      font-size: 27px;
    }

    @keyframes floatHeart {
      0%, 100% { transform: translateY(0) rotate(-6deg) scale(1); opacity: 0.48; }
      50% { transform: translateY(-18px) rotate(8deg) scale(1.1); opacity: 0.78; }
    }

    @keyframes wiggle {
      0%, 100% { transform: rotate(-3deg) translateY(0); }
      50% { transform: rotate(4deg) translateY(-5px); }
    }

    @keyframes noPulse {
      0%, 100% { transform: rotate(-5deg) scale(1); }
      50% { transform: rotate(5deg) scale(1.1); }
    }

    @keyframes fall {
      from { opacity: 0; transform: translate3d(0, -18px, 0) rotate(0deg); }
      15% { opacity: 1; }
      to { opacity: 0; transform: translate3d(var(--drift), 105vh, 0) rotate(var(--spin)); }
    }

    @media (max-height: 720px) {
      .screen { gap: 12px; padding-top: max(18px, env(safe-area-inset-top)); }
      [data-screen="ask"].screen { gap: 12px; padding-top: max(42px, env(safe-area-inset-top)); }
      .meme { width: min(34vw, 124px); height: min(34vw, 124px); font-size: min(21vw, 82px); }
      .meme.photo { width: auto; height: auto; padding: 0; }
      .meme-duo { width: min(72vw, 250px); }
      .bottom-stickers img { width: 150px; }
      .card { padding: 21px 18px 19px; }
      h1 { font-size: 28px; }
      h2 { font-size: 24px; }
      .sub { font-size: 14px; }
      .picker-window { height: 138px; }
      .food { height: 62px; font-size: 30px; }
      [data-screen="share"].screen { padding: max(18px, env(safe-area-inset-top)) 14px max(16px, env(safe-area-inset-bottom)); gap: 14px; }
      .result-card { min-height: min(76dvh, 560px); padding: 24px 20px 24px; }
      .result-sticker { width: 190px; height: 150px; margin-bottom: 2px; }
      .result-sticker img { width: 182px; max-height: 150px; }
      .result-rank { font-size: 12px; }
      .result-rank strong { font-size: 16px; }
      .dash { margin: 16px auto; }
      .achievement-label { font-size: 14px; }
      .achievement-title { font-size: 26px; }
      .choice-grid { gap: 10px; margin-top: 10px; }
      .choice-tile { min-height: 88px; padding: 12px 8px 10px; }
      .poster-reward { margin-top: 16px; font-size: 14px; }
      .reward-pills { gap: 6px; }
      .reward-pill { font-size: 11px; padding: 4px; }
      .system-note { font-size: 15px; line-height: 1.4; max-width: 235px; }
      .result-actions { gap: 10px; padding: 0 8px; }
      .result-btn { height: 46px; font-size: 16px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="phone" id="app">
    <span class="heart" style="left:9%;top:11%;--size:31px;--speed:3.4s;">♥</span>
    <span class="heart" style="left:70%;top:8%;--size:24px;--speed:4.2s;">♥</span>
    <span class="heart" style="left:83%;top:22%;--size:34px;--speed:3.8s;">♥</span>
    <span class="heart" style="left:14%;top:39%;--size:26px;--speed:4.6s;">♥</span>
    <span class="heart" style="left:75%;top:54%;--size:24px;--speed:3.1s;">♥</span>
    <span class="heart" style="left:20%;top:76%;--size:39px;--speed:4s;">♥</span>
    <span class="heart" style="left:62%;top:84%;--size:27px;--speed:3.6s;">♥</span>

    <section class="screen active" data-screen="ask">
      <div class="meme photo" aria-hidden="true">
        <img src="./assets/knockout%203.PNG" alt="">
      </div>
      <div class="card">
        <h1>要一起吃饭饭吗？</h1>
        <p class="sub">给你一个认真考虑 0.3 秒的机会。</p>
        <div class="actions">
          <button class="pill" id="yesBtn" type="button">Yes 💕</button>
          <button class="pill secondary" id="noBtn" type="button">NO</button>
        </div>
      </div>
    </section>

    <section class="screen" data-screen="yes">
      <div class="meme photo" aria-hidden="true">
        <img src="./assets/knockout.PNG" alt="">
      </div>
      <div class="card">
        <h2>没想到你会点yes</h2>
        <p class="sub">我本来已经准备好看你点 No了。</p>
        <button class="pill" id="nextToDate" type="button">Next 💖</button>
      </div>
    </section>

    <section class="screen" data-screen="date">
      <div class="meme photo" aria-hidden="true">
        <img src="./assets/knockout%202.PNG" alt="">
      </div>
      <div class="date-picker">
        <h2>什么时候集合？</h2>
        <div class="picker-wrap">
          <div class="picker-line"></div>
          <div class="picker-window" id="pickerWindow" aria-label="今天 19:00">
            <div class="picker-col">
              <span>昨天</span>
              <strong id="pickerDay">今天</strong>
              <span>明天</span>
            </div>
            <div class="picker-col">
              <span id="prevHour">18</span>
              <strong id="pickerHour">19</strong>
              <span id="nextHour">20</span>
            </div>
            <div class="picker-col">
              <span>30</span>
              <strong>00</strong>
              <span>30</span>
            </div>
          </div>
        </div>
        <div class="hour-strip" id="hourStrip" aria-label="滑动选择几点">
          <button class="hour-chip" data-hour="17" type="button">17点</button>
          <button class="hour-chip" data-hour="18" type="button">18点</button>
          <button class="hour-chip selected" data-hour="19" type="button">19点</button>
          <button class="hour-chip" data-hour="20" type="button">20点</button>
          <button class="hour-chip" data-hour="21" type="button">21点</button>
          <button class="hour-chip" data-hour="22" type="button">22点</button>
        </div>
        <div class="date-options">
          <button class="date-option selected" data-day="今天" type="button">今天</button>
          <button class="date-option" data-day="明天" type="button">明天</button>
          <button class="date-option" id="customTimeBtn" type="button" disabled>你定时间</button>
        </div>
        <div class="actions">
          <button class="pill" id="confirmDate" type="button">✓ 就这个</button>
          <button class="pill disabled" id="resetDate" type="button">Reset</button>
        </div>
      </div>
    </section>

    <section class="screen" data-screen="food">
      <div class="card">
        <h2>想吃点什么？😉</h2>
        <p class="sub">先随便点一个，反正最后还是我安排。</p>
        <div class="food-grid" id="foodGrid">
          <button class="food" data-food="🍲 火锅" type="button">🍲</button>
          <button class="food" data-food="🥩 烤肉" type="button">🥩</button>
          <button class="food" data-food="🍣 日料" type="button">🍣</button>
          <button class="food" data-food="🍗 韩料" type="button">🍗</button>
          <button class="food" data-food="🦞 小龙虾" type="button">🦞</button>
          <button class="food" data-food="🍖 烧烤" type="button">🍖</button>
        </div>
        <div class="actions">
          <button class="pill disabled" id="finishBtn" type="button">Pick one first</button>
          <input class="custom-food" id="customFoodInput" type="text" maxlength="18" placeholder="或者你想吃什么呢">
        </div>
      </div>
    </section>

    <section class="screen" data-screen="done">
      <div class="meme-duo" aria-hidden="true">
        <img src="./assets/cat-done-1.jpg" alt="">
        <img src="./assets/cat-done-2.jpg" alt="">
      </div>
      <div class="card">
        <h2>收到，饭搭子。</h2>
        <p class="sub" id="finalLead">准备好肚子，我来接你。</p>
        <div class="summary">
          <div><span>人员</span><span class="mini">你 + 我</span></div>
          <div><span>时间</span><span class="mini" id="finalTime">今天 19:00</span></div>
          <div><span>吃什么</span><span class="mini" id="finalFood">还没选</span></div>
        </div>
        <button class="pill share-entry" id="shareEntryBtn" type="button">🏆 分享战绩</button>
      </div>
      <div class="bottom-stickers" aria-hidden="true">
        <img src="./assets/knockout%205.PNG" alt="">
      </div>
    </section>

    <section class="screen" data-screen="share">
      <div class="result-card" id="resultCard">
        <div class="poster-main">
          <div class="result-sticker" aria-hidden="true">
            <span class="result-float" style="left:-8px;top:70px;--s:22px;--speed:3.6s;">♥</span>
            <span class="result-float" style="right:-2px;top:22px;--s:25px;--speed:4.1s;">♥</span>
            <span class="result-float" style="right:10px;top:90px;--s:34px;--speed:3.2s;">♥</span>
            <span class="result-float" style="right:8px;top:132px;--s:14px;--speed:4.4s;">✦</span>
            <img src="./assets/knockout%204.PNG" alt="">
          </div>

          <p class="result-rank">
            全球第 <strong id="shareRank">88727</strong> 位约饭人
          </p>

          <div class="achievement">
            <div class="achievement-label">🏆 Achievement Unlocked</div>
            <div class="achievement-title">饭搭子已确认</div>
          </div>
        </div>

        <div class="poster-choices">
          <div class="result-heading">你的选择</div>
          <div class="choice-grid">
            <div class="choice-tile">
              <div>吃什么</div>
              <span class="choice-icon">🍜</span>
              <span class="choice-value" id="shareFood">还没选</span>
            </div>
            <div class="choice-tile">
              <div>时间</div>
              <span class="choice-icon">🕘</span>
              <span class="choice-value" id="shareTime">今天 19:00</span>
            </div>
          </div>
        </div>
        <div class="poster-reward">奖励💗：【减肥计划延迟一天】</div>
        <div class="result-footer">♥♥♥</div>
      </div>
      <div class="result-actions">
        <button class="result-btn" id="shareResultBtn" type="button">📸 截图发给 TA</button>
      </div>
    </section>

    <div class="toast" id="toast"></div>
    <div class="fx-layer" id="fxLayer"></div>
  </main>

  <script>
    const state = {
      screen: "ask",
      noTimer: null,
      food: "",
      customFood: "",
      time: "今天 19:00",
      day: "今天",
      hour: 19,
    };

    const app = document.getElementById("app");
    const screens = [...document.querySelectorAll(".screen")];
    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");
    const toast = document.getElementById("toast");
    const fxLayer = document.getElementById("fxLayer");
    const finishBtn = document.getElementById("finishBtn");
    const customFoodInput = document.getElementById("customFoodInput");
    const finalFood = document.getElementById("finalFood");
    const finalTime = document.getElementById("finalTime");
    const finalLead = document.getElementById("finalLead");
    const resultCard = document.getElementById("resultCard");
    const shareResultBtn = document.getElementById("shareResultBtn");
    const shareEntryBtn = document.getElementById("shareEntryBtn");
    const shareFood = document.getElementById("shareFood");
    const shareTime = document.getElementById("shareTime");
    const shareRank = document.getElementById("shareRank");
    const pickerWindow = document.getElementById("pickerWindow");
    const pickerDay = document.getElementById("pickerDay");
    const pickerHour = document.getElementById("pickerHour");
    const prevHour = document.getElementById("prevHour");
    const nextHour = document.getElementById("nextHour");
    const hourStrip = document.getElementById("hourStrip");

    function random(min, max) {
      return Math.random() * (max - min) + min;
    }

    function go(next) {
      state.screen = next;
      screens.forEach((screen) => {
        screen.classList.toggle("active", screen.dataset.screen === next);
      });
      if (next !== "ask") stopNo();
    }

    function showToast(text) {
      toast.textContent = text;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove("show"), 1400);
    }

    function formatTime() {
      state.time = `${state.day} ${String(state.hour).padStart(2, "0")}:00`;
    }

    function renderPicker() {
      formatTime();
      pickerDay.textContent = state.day;
      pickerHour.textContent = String(state.hour).padStart(2, "0");
      prevHour.textContent = String(Math.max(0, state.hour - 1)).padStart(2, "0");
      nextHour.textContent = String(Math.min(23, state.hour + 1)).padStart(2, "0");
      pickerWindow.setAttribute("aria-label", state.time);

      document.querySelectorAll(".date-option[data-day]").forEach((btn) => {
        btn.classList.toggle("selected", btn.dataset.day === state.day);
      });
      document.querySelectorAll(".hour-chip").forEach((btn) => {
        btn.classList.toggle("selected", Number(btn.dataset.hour) === state.hour);
      });
    }

    function renderShareCard() {
      const pickedFood = state.customFood || state.food || "还没选";
      shareFood.textContent = pickedFood;
      shareTime.textContent = state.time;
      shareRank.textContent = "88727";
    }

    function moveNo() {
      if (state.screen !== "ask") return;
      const appRect = app.getBoundingClientRect();
      const btnRect = noBtn.getBoundingClientRect();
      const margin = 12;
      const maxLeft = appRect.width - btnRect.width - margin;
      const maxTop = Math.min(appRect.height * 0.72, appRect.height - btnRect.height - margin);
      noBtn.style.left = `${random(margin, Math.max(margin, maxLeft))}px`;
      noBtn.style.top = `${random(margin, Math.max(margin, maxTop))}px`;
      clearTimeout(state.noTimer);
      state.noTimer = setTimeout(moveNo, 200);
    }

    function stopNo() {
      clearTimeout(state.noTimer);
      state.noTimer = null;
    }

    function hearts() {
      fxLayer.innerHTML = "";
      const list = ["💗", "💕", "💖", "💘", "🍚", "🥢"];
      for (let i = 0; i < 34; i += 1) {
        const item = document.createElement("span");
        item.className = "fall";
        item.textContent = list[Math.floor(Math.random() * list.length)];
        item.style.left = `${random(0, 96)}%`;
        item.style.animationDelay = `${random(0, 260)}ms`;
        item.style.setProperty("--drift", `${random(-70, 70)}px`);
        item.style.setProperty("--spin", `${random(160, 560)}deg`);
        fxLayer.appendChild(item);
      }
      setTimeout(() => { fxLayer.innerHTML = ""; }, 1900);
    }

    yesBtn.addEventListener("click", () => {
      hearts();
      if (navigator.vibrate) navigator.vibrate([40, 30, 60]);
      setTimeout(() => go("yes"), 620);
    });

    noBtn.addEventListener("click", (event) => {
      event.preventDefault();
      showToast("别点这个，系统会伤心。");
      moveNo();
    });
    noBtn.addEventListener("touchstart", (event) => {
      event.preventDefault();
      showToast("抓不到吧。");
      moveNo();
    }, { passive: false });
    noBtn.addEventListener("pointerenter", moveNo);

    document.getElementById("nextToDate").addEventListener("click", () => go("date"));
    document.getElementById("confirmDate").addEventListener("click", () => go("food"));
    document.getElementById("resetDate").addEventListener("click", () => {
      state.day = "今天";
      state.hour = 19;
      renderPicker();
      showToast("重置成今天，别想太多。");
    });

    document.querySelectorAll(".date-option[data-day]").forEach((btn) => {
      btn.addEventListener("click", () => {
        state.day = btn.dataset.day;
        renderPicker();
      });
    });

    document.querySelectorAll(".hour-chip").forEach((btn) => {
      btn.addEventListener("click", () => {
        state.hour = Number(btn.dataset.hour);
        renderPicker();
        btn.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
      });
    });

    hourStrip.addEventListener("scroll", () => {
      clearTimeout(hourStrip.snapTimer);
      hourStrip.snapTimer = setTimeout(() => {
        const stripRect = hourStrip.getBoundingClientRect();
        const center = stripRect.left + stripRect.width / 2;
        let nearest = null;
        let distance = Infinity;

        document.querySelectorAll(".hour-chip").forEach((btn) => {
          const rect = btn.getBoundingClientRect();
          const btnCenter = rect.left + rect.width / 2;
          const currentDistance = Math.abs(btnCenter - center);
          if (currentDistance < distance) {
            nearest = btn;
            distance = currentDistance;
          }
        });

        if (nearest) {
          state.hour = Number(nearest.dataset.hour);
          renderPicker();
        }
      }, 120);
    });

    document.querySelectorAll(".food").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".food").forEach((food) => food.classList.remove("selected"));
        btn.classList.add("selected");
        state.food = btn.dataset.food;
        finishBtn.classList.remove("disabled");
        finishBtn.textContent = "OK 就它 💅";
      });
    });

    customFoodInput.addEventListener("input", () => {
      state.customFood = customFoodInput.value.trim();
      if (state.customFood) {
        finishBtn.classList.remove("disabled");
        finishBtn.textContent = "OK 就吃这个 💅";
      } else if (!state.food) {
        finishBtn.classList.add("disabled");
        finishBtn.textContent = "Pick one first";
      } else {
        finishBtn.textContent = "OK 就它 💅";
      }
    });

    finishBtn.addEventListener("click", () => {
      const pickedFood = state.customFood || state.food;
      if (!pickedFood) {
        showToast("先点一个吃的。");
        return;
      }
      finalFood.textContent = pickedFood;
      finalTime.textContent = state.time;
      finalLead.textContent = `${state.time}，准备好肚子，我来接你。`;
      hearts();
      setTimeout(() => go("done"), 430);
    });

    shareEntryBtn.addEventListener("click", () => {
      renderShareCard();
      go("share");
    });
    shareResultBtn.addEventListener("click", () => {
      showToast("截图发送给邀请人即可领取约饭资格 😎");
    });

    window.addEventListener("resize", () => {
      if (state.screen === "ask") moveNo();
    });

    moveNo();
    renderPicker();
  </script>
</body>
</html>
